<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosperidad Inteligente | Tu Futuro Financiero Comienza Aquí</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta Refinada y Profesional */
            --azul-oscuro: #101827;     /* Header, Títulos */
            --verde-acento: #10B981;    /* CTAs, Bordes, Éxito */
            --verde-hover: #059669;
            --gris-fondo: #F9FAFB;      /* Fondo suave */
            --blanco: #FFFFFF;
            --texto-cuerpo: #4B5563;
            --texto-titulos: #1F2937;
            
            /* Sombras y Bordes Suaves */
            --sombra-card: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --sombra-header: 0 4px 6px -1px rgba(0, 0, 0, 0.03);
            --border-radius: 12px;
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--gris-fondo); color: var(--texto-cuerpo); line-height: 1.7; overflow-x: hidden; }
        
        /* --- HEADER & NAV (Más limpio) --- */
        header { background: var(--azul-oscuro); padding: 1rem 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: var(--sombra-header); }
        .logo { color: var(--blanco); font-size: 1.5rem; font-weight: 700; text-decoration: none; letter-spacing: -0.5px; }
        .logo strong { color: var(--verde-acento); }
        nav { display: flex; gap: 25px; align-items: center; }
        nav a { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: var(--transition); padding: 5px 10px; border-radius: 6px; }
        nav a:hover { color: var(--blanco); background: rgba(255,255,255,0.1); }
        .nav-active { color: var(--blanco); background: rgba(16, 185, 129, 0.2); border: 1px solid var(--verde-acento); }

        /* --- ADSENSE PLACEHOLDER (Más integrado) --- */
        .ads-container { display: flex; justify-content: center; margin: 30px 0; }
        .adsense-placeholder { background: #f3f4f6; border: 1px dashed #d1d5db; display: flex; align-items: center; justify-content: center; color: #9ca3af; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; font-weight: 600; border-radius: 8px; }

        /* --- HERO SECTION (Diseño Moderno Centrado) --- */
        .hero { 
            background: linear-gradient(rgba(16, 24, 39, 0.9), rgba(16, 24, 39, 0.95)), 
                        url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover; background-position: center; color: white; padding: 120px 10%; text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 3rem; margin-bottom: 20px; font-weight: 700; line-height: 1.2; letter-spacing: -1px; color: var(--blanco); }
        .hero p { font-size: 1.2rem; font-weight: 300; max-width: 700px; margin: 0 auto 40px; color: rgba(255,255,255,0.85); }
        <a href="ahorro.html#metodo-500" style="text-decoration: none;">
    <button class="btn-cta">Descubre cómo ahorrar 500€ al mes</button>
</a>

        /* --- CONTENEDOR PRINCIPAL (Artículo + Sidebar) --- */
        .main-wrapper { display: grid; grid-template-columns: 2.6fr 1fr; gap: 40px; padding: 0 8%; max-width: 1400px; margin: 0 auto 60px auto; }
        
        /* --- DISEÑO DEL ARTÍCULO (Limpio y Centrado) --- */
        article { background: var(--blanco); padding: 45px; border-radius: var(--border-radius); box-shadow: var(--sombra-card); border: 1px solid rgba(0,0,0,0.03); }
        .article-meta { font-size: 0.85rem; color: #9ca3af; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        article h1 { color: var(--azul-oscuro); font-size: 2.6rem; margin-top: 0; margin-bottom: 25px; font-weight: 700; letter-spacing: -1px; }
        article h2 { color: var(--texto-titulos); font-size: 1.8rem; margin: 40px 0 20px 0; font-weight: 600; padding-bottom: 10px; border-bottom: 2px solid #e5e7eb; position: relative; }
        article h2::after { content: ''; position: absolute; left: 0; bottom: -2px; width: 60px; height: 2px; background-color: var(--verde-acento); }
        article p { color: var(--texto-cuerpo); font-size: 1.1rem; margin-bottom: 25px; }

        /* Imagen Principal del Artículo */
        .article-main-img { width: 100%; height: 450px; object-fit: cover; border-radius: 10px; margin-bottom: 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }

        /* --- SIDEBAR (Sticky) --- */
        aside { position: sticky; top: 100px; height: fit-content; display: flex; flex-direction: column; gap: 30px; }
        
        /* Newsletter Box - Estilo Premium */
        .newsletter-box { background: var(--blanco); padding: 30px; border-radius: var(--border-radius); border: 1px solid rgba(16, 185, 129, 0.1); box-shadow: var(--sombra-card); text-align: center; }
        .newsletter-box h3 { color: var(--texto-titulos); margin-top: 0; font-size: 1.4rem; font-weight: 600; }
        .newsletter-box p { font-size: 0.9rem; margin-bottom: 20px; color: var(--texto-cuerpo); }
        .newsletter-box input { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #e5e7eb; border-radius: 8px; font-family: inherit; }
        .newsletter-box input:focus { border-color: var(--verde-acento); outline: none; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }
