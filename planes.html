<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suscripción VIP | Prosperidad Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #101827; --verde: #10B981; --gris: #F9FAFB; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--gris); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .plan-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            border: 2px solid var(--verde);
        }
        h2 { color: var(--azul); margin-bottom: 10px; }
        .precio { font-size: 3rem; font-weight: 700; color: var(--azul); margin: 20px 0; }
        .precio span { font-size: 1rem; color: #999; }
        ul { list-style: none; text-align: left; margin: 30px 0; }
        ul li { margin-bottom: 10px; }
        ul li::before { content: "✅ "; color: var(--verde); }
        
        .btn-pagar {
            background: var(--azul);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }
        .btn-pagar:hover { background: #1f2937; transform: scale(1.02); }
        .volver { margin-top: 20px; display: block; color: var(--verde); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="plan-card">
    <h2>Acceso VIP</h2>
    <p>Únete a la élite financiera</p>
    <div class="precio">9.99€<span>/mes</span></div>
    <ul>
        <li>Guías de ahorro exclusivas</li>
        <li>Alertas de inversión en tiempo real</li>
        <li>Calculadoras avanzadas sin límites</li>
        <li>Soporte personalizado</li>
    </ul>
    <button class="btn-pagar" onclick="window.location.href='https://www.paypal.com'">PAGAR AHORA</button>
    <a href="index.html" class="volver">← Volver atrás</a>
</div>

</body>
</html>
