<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes VIP | Prosperidad Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #101827; --verde: #10B981; --gris: #F9FAFB; --blanco: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--gris); color: #4B5563; line-height: 1.6; }
        
        header { background: var(--azul); padding: 1.2rem 8%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { color: white; font-size: 1.4rem; font-weight: 700; text-decoration: none; }
        .logo strong { color: var(--verde); }
        nav { display: flex; gap: 10px; }
        nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; padding: 8px 16px; border-radius: 8px; border: 1px solid transparent; transition: 0.3s; }
        
        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; text-align: center; }
        
        /* Tarjeta de Precio Premium */
        .pricing-card { 
            background: white; 
            padding: 50px; 
            border-radius: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            border: 2px solid var(--verde);
            position: relative;
            overflow: hidden;
        }
        .pricing-card h2 { color: var(--azul); font-size: 2rem; margin-bottom: 10px; }
        .price { font-size: 3.5rem; font-weight: 700; color: var(--azul); margin: 20px 0; }
        .price span { font-size: 1.2rem; font-weight: 400; color: #9ca3af; }
        
        .features { list-style: none; padding: 0; margin: 30px 0; text-align: left; }
        .features li { margin-bottom: 15px; display: flex; align-items: center; font-size: 1.1rem; }
        .features li::before { content: '✓'; color: var(--verde); font-weight: bold; margin-right: 15px; }
        
        .btn-pay { 
            background: var(--azul); 
            color: white; 
            width: 100%; 
            padding: 20px; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.2rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
        }
