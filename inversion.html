<div class="container">
    <article>
        <h1>Calculadora de Interés Compuesto</h1>
        <div style="background:var(--azul); color:white; padding:30px; border-radius:12px; margin-top:20px;">
            <label>Inversión Inicial (€)</label>
            <input type="number" id="capital" style="width:100%; padding:10px; margin:10px 0; border-radius:5px;">
            <button onclick="calcular()" style="width:100%; padding:15px; background:var(--verde); color:white; border:none; font-weight:700; border-radius:5px; cursor:pointer;">CALCULAR FUTURO</button>
            <h2 id="resultado" style="text-align:center; margin-top:20px; color:var(--verde);">$0.00</h2>
        </div>
    </article>
</div>
<script>
    function calcular() {
        let cap = document.getElementById('capital').value;
        let res = cap * Math.pow(1.08, 10); // Ejemplo a 10 años al 8%
        document.getElementById('resultado').innerText = res.toLocaleString('es-ES', {style: 'currency', currency: 'EUR'});
    }
</script>
</body>
