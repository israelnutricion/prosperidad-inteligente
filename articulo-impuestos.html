<h1>Impuestos básicos: Lo que debes saber</h1>
<p>No entender los impuestos es perder dinero legalmente. En España, el IRPF es progresivo: cuanto más ganas, más pagas.</p>
<p><strong>Deducciones:</strong> Infórmate sobre qué gastos puedes desgravar (vivienda, donaciones, planes de pensiones) para que Hacienda te devuelva dinero.</p>
